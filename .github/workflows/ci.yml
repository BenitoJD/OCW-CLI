name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run syntax checks and tests
        run: OCW_SKIP_SHELLCHECK=1 ./scripts/lint.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run lint
        run: ./scripts/lint.sh

  actionlint:
    name: ActionLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run workflow lint
        run: actionlint .github/workflows/*.yml

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release archive
        run: ./scripts/package.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ocw-dist
          path: dist/*

  gauntlet:
    name: Gauntlet
    runs-on: ubuntu-latest
    needs: [test, shellcheck, actionlint]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run packaged CLI gauntlet
        run: ./scripts/gauntlet.sh
